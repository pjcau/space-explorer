<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Space Explorer</title>
  <style>
    :root {
      --bg: #05060a;
      --panel: rgba(15, 18, 28, 0.92);
      --panel-border: rgba(120, 140, 200, 0.25);
      --text: #e4e9f5;
      --muted: #8b94aa;
      --accent: #4ec3ff;
      --accent-dim: rgba(78, 195, 255, 0.18);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100vw; height: 100vh; overflow: hidden; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    #scene { position: fixed; inset: 0; }
    #topbar {
      position: fixed; top: 0; left: 0; right: 0; height: 56px;
      background: linear-gradient(to bottom, rgba(5,6,10,0.95), rgba(5,6,10,0.4));
      display: flex; align-items: center; padding: 0 16px; gap: 12px; z-index: 5;
    }
    #title { font-size: 16px; font-weight: 600; letter-spacing: 0.5px; }
    #scene-name { color: var(--accent); margin-left: 8px; font-weight: 500; }
    #search { flex: 0 0 240px; background: rgba(255,255,255,0.06); border: 1px solid var(--panel-border);
              color: var(--text); padding: 8px 12px; border-radius: 6px; font-size: 13px; outline: none; }
    #search:focus { border-color: var(--accent); }
    .filter-group { display: flex; gap: 4px; }
    .filter-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--panel-border); color: var(--muted);
                  padding: 6px 12px; border-radius: 4px; font-size: 12px; cursor: pointer; transition: all 0.15s; }
    .filter-btn.active { background: var(--accent-dim); color: var(--accent); border-color: var(--accent); }
    .filter-btn:hover:not(.active) { color: var(--text); }
    #counter { margin-left: auto; color: var(--muted); font-size: 12px; }
    #planet-bar {
      position: fixed; bottom: 0; left: 0; right: 0; padding: 14px 16px 18px;
      background: linear-gradient(to top, rgba(5,6,10,0.95), rgba(5,6,10,0));
      display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; z-index: 5;
    }
    .planet-pill {
      background: rgba(255,255,255,0.05); border: 1px solid var(--panel-border); color: var(--text);
      padding: 8px 14px; border-radius: 22px; font-size: 13px; cursor: pointer; transition: all 0.18s;
      display: flex; align-items: center; gap: 8px;
    }
    .planet-pill:hover { border-color: var(--accent); background: var(--accent-dim); }
    .planet-pill.active { background: var(--accent); color: #05060a; border-color: var(--accent); font-weight: 600; }
    .planet-pill .swatch { width: 10px; height: 10px; border-radius: 50%; }
    #detail {
      position: fixed; right: 14px; top: 70px; width: 320px; max-height: calc(100vh - 160px);
      background: var(--panel); border: 1px solid var(--panel-border); border-radius: 10px;
      padding: 18px; overflow-y: auto; backdrop-filter: blur(8px);
      transform: translateX(360px); transition: transform 0.25s ease;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }
    #detail.open { transform: translateX(0); }
    #detail h2 { font-size: 18px; margin-bottom: 4px; }
    #detail .subtitle { color: var(--muted); font-size: 12px; margin-bottom: 14px; text-transform: uppercase; letter-spacing: 1px; }
    #detail .row { display: flex; justify-content: space-between; gap: 12px; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.06); font-size: 13px; }
    #detail .row .k { color: var(--muted); }
    #detail .row .v { color: var(--text); text-align: right; font-variant-numeric: tabular-nums; }
    #detail .desc { margin-top: 14px; padding-top: 14px; border-top: 1px solid rgba(255,255,255,0.08); font-size: 13px; line-height: 1.5; color: #c8d0e0; }
    #detail .section { margin-top: 14px; font-size: 11px; text-transform: uppercase; color: var(--accent); letter-spacing: 1.5px; margin-bottom: 6px; }
    #detail .chip-row { display: flex; flex-wrap: wrap; gap: 6px; }
    #detail .chip { background: rgba(78,195,255,0.12); color: var(--accent); padding: 4px 10px; border-radius: 12px; font-size: 11px; cursor: pointer; border: 1px solid transparent; }
    #detail .chip:hover { border-color: var(--accent); }
    #detail .close { position: absolute; top: 12px; right: 12px; color: var(--muted); cursor: pointer; font-size: 18px; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; }
    #detail .close:hover { color: var(--text); }
    #tooltip {
      position: fixed; pointer-events: none; background: rgba(15,18,28,0.95); border: 1px solid var(--accent);
      padding: 6px 10px; border-radius: 4px; font-size: 12px; z-index: 10; opacity: 0;
      transition: opacity 0.12s; white-space: nowrap;
    }
    #tooltip.show { opacity: 1; }
    #tooltip .name { color: var(--accent); font-weight: 600; }
    #tooltip .meta { color: var(--muted); font-size: 11px; }
    #loading { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: var(--bg); z-index: 100; transition: opacity 0.4s; }
    #loading.hidden { opacity: 0; pointer-events: none; }
    #status { position: fixed; bottom: 76px; left: 16px; color: var(--muted); font-size: 11px; z-index: 4; }
    #recenter { position: fixed; top: 70px; left: 14px; background: var(--panel); border: 1px solid var(--panel-border);
                color: var(--text); padding: 8px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; z-index: 4; }
    #recenter:hover { border-color: var(--accent); color: var(--accent); }

    /* --------- Playback controls (bottom-left) --------- */
    #controls {
      position: fixed; left: 14px; bottom: 76px;
      background: var(--panel); border: 1px solid var(--panel-border); border-radius: 8px;
      padding: 10px 12px; display: flex; flex-direction: column; gap: 8px; min-width: 220px;
      backdrop-filter: blur(8px); z-index: 4; font-size: 12px;
    }
    #controls .row { display: flex; align-items: center; gap: 8px; }
    #controls .label { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
    #controls button { background: rgba(255,255,255,0.06); border: 1px solid var(--panel-border); color: var(--text);
                       padding: 6px 10px; border-radius: 4px; font-size: 12px; cursor: pointer; }
    #controls button:hover { border-color: var(--accent); color: var(--accent); }
    #controls button.active { background: var(--accent-dim); color: var(--accent); border-color: var(--accent); }
    #controls input[type="range"] { flex: 1; accent-color: var(--accent); }
    #controls .val { color: var(--accent); font-variant-numeric: tabular-nums; min-width: 56px; text-align: right; font-weight: 600; }
    #controls .toggle { display: inline-flex; align-items: center; gap: 6px; cursor: pointer; }
    #controls .toggle input { accent-color: var(--accent); }
  </style>
</head>
<body>
  <div id="loading">Loading…</div>
  <div id="topbar">
    <div id="title">🛰 Space Explorer<span id="scene-name">Earth</span></div>
    <input id="search" placeholder="Search satellites…" />
    <div class="filter-group" id="filters">
      <button class="filter-btn active" data-filter="ALL">All</button>
      <button class="filter-btn" data-filter="LEO">LEO</button>
      <button class="filter-btn" data-filter="MEO">MEO</button>
      <button class="filter-btn" data-filter="GEO">GEO</button>
    </div>
    <div id="counter"></div>
  </div>
  <button id="recenter" title="Reset camera">⌖ Recenter</button>

  <div id="controls">
    <div class="row">
      <button id="play-pause" title="Pause / play">⏸ Pause</button>
      <span class="label">Speed</span>
      <span class="val" id="speed-val">600×</span>
    </div>
    <div class="row">
      <input type="range" id="speed" min="0" max="100" value="60" step="1" />
    </div>
    <div class="row">
      <label class="toggle"><input type="checkbox" id="show-orbits" checked /> Show orbits</label>
    </div>
  </div>

  <div id="status">Hover for info · click to focus · ⏸ pause + slider for speed · planet bar to jump</div>
  <canvas id="scene"></canvas>
  <div id="planet-bar"></div>
  <div id="detail">
    <div class="close" id="detail-close">×</div>
    <div id="detail-body"></div>
  </div>
  <div id="tooltip"></div>

  <script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                   "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // Backend is served on a configurable URL. When running via docker-compose,
    // the nginx in front of the frontend proxies /api/* to the backend, so the
    // page just calls window.location.origin + '/api'. When served directly via
    // `python -m http.server`, fall back to localhost:8000.
    const API_BASE = (() => {
      const cfg = document.querySelector('meta[name="api-base"]');
      if (cfg) return cfg.getAttribute('content');
      // Dockerised stack (single port 5500) → nginx proxies /api/* to backend.
      if (location.port === '5500' || location.protocol === 'https:') return location.origin + '/api';
      // Bare `python -m http.server` on 8090 → backend exposed directly on :8000.
      if (location.port === '8090') return 'http://127.0.0.1:8000';
      return location.origin + '/api';
    })();

    const $ = (id) => document.getElementById(id);

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x05060a);
    const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 200000);
    const renderer = new THREE.WebGLRenderer({ canvas: $('scene'), antialias: true });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(Math.min(2, devicePixelRatio));
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true; controls.dampingFactor = 0.08;
    addEventListener('resize', () => {
      camera.aspect = innerWidth/innerHeight; camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });

    // Starfield
    {
      const g = new THREE.BufferGeometry();
      const n = 4000, pts = new Float32Array(n*3);
      for (let i = 0; i < n*3; i++) pts[i] = (Math.random()-0.5) * 8000;
      g.setAttribute('position', new THREE.BufferAttribute(pts, 3));
      scene.add(new THREE.Points(g, new THREE.PointsMaterial({ color: 0xaab2cc, size: 1.5, sizeAttenuation: false })));
    }
    scene.add(new THREE.PointLight(0xffffff, 1.4, 0, 0));
    scene.add(new THREE.AmbientLight(0x303040, 0.6));

    let sceneObjects = [];
    let currentSceneKey = null;
    let satellites = [];
    let planets = [];
    let activeFilter = 'ALL';
    let searchQuery = '';
    const PLANET_R = 60;

    const api = async (path) => {
      const r = await fetch(API_BASE + path);
      if (!r.ok) throw new Error(`${path}: ${r.status}`);
      return r.json();
    };
    const arr = (p, k) => Array.isArray(p) ? p : (p?.[k] ?? []);

    function clearScene() {
      const toRemove = [];
      scene.traverse(o => { if (o.userData?.transient) toRemove.push(o); });
      for (const o of toRemove) scene.remove(o);
      sceneObjects = [];
    }

    function buildEarthScene() {
      currentSceneKey = 'earth';
      $('scene-name').textContent = ' Earth orbit';
      clearScene();
      const earth = new THREE.Mesh(
        new THREE.SphereGeometry(PLANET_R, 64, 64),
        new THREE.MeshStandardMaterial({ color: 0x2266aa, emissive: 0x102040, emissiveIntensity: 0.25, roughness: 0.6 })
      );
      earth.userData = { transient: true, kind: 'planet', id: 3, name: 'Earth' };
      scene.add(earth);
      sceneObjects.push(earth);
      for (const sat of filterSats(satellites)) addSatelliteMesh(sat);
      rebuildOrbitLines();
      camera.position.set(0, 80, 220);
      controls.target.set(0,0,0);
      controls.update();
      updateCounter();
    }

    // Visual time-warp. 1× = real time (a 95-min LEO orbit takes 95 min);
    // 600× compresses it to ~9.5 s. The user can change this at runtime via
    // the speed slider; pause sets it to 0 and remembers the previous value.
    const SAT_TIME_SCALE_DEFAULT = 600;
    let satTimeScale = SAT_TIME_SCALE_DEFAULT;
    let paused = false;
    let lastResumeScale = SAT_TIME_SCALE_DEFAULT;
    // We track *simulated* seconds (advanced manually so pause/speed changes
    // don't jump satellites). All updateSatellitePosition() calls take this.
    let simSec = 0;
    let lastFrameReal = performance.now();
    let showOrbits = true;
    let orbitLinesObj = null;

    function addSatelliteMesh(sat) {
      // Visual radius: compress real altitude into the scene (Earth radius
      // = PLANET_R = 60 scene-units; 1 km ≈ 1/40 scene-units, with a 1.6×
      // multiplier so the band is visible).
      const altScene = Math.max(1, (sat.altitude_km || 500)) / 40;
      const r = PLANET_R + altScene * 1.6;
      const inc = (sat.inclination_deg || 0) * Math.PI / 180;
      // Per-satellite RAAN — spread orbits across all longitudes using a
      // golden-angle derived sequence so consecutive ids fall on visually
      // distinct planes instead of clustering.
      const raan = ((sat.id * 137.508) % 360) * Math.PI / 180;
      // Per-satellite starting mean anomaly — different phase so even
      // co-planar satellites are spread along the ring.
      const phase0 = ((sat.id * 73.07) % 360) * Math.PI / 180;
      const periodS = Math.max(60, (sat.period_min || 95) * 60);
      const meanMotion = 2 * Math.PI / periodS;  // rad / real-second-of-sim

      const color = sat.type === 'GEO' ? 0xff7755
                  : sat.type === 'MEO' ? 0xffd24e
                  : 0x4ec3ff;
      const mesh = new THREE.Mesh(
        new THREE.SphereGeometry(1.2, 10, 10),
        new THREE.MeshBasicMaterial({ color })
      );
      // Store the orbital params + cached trig so the render loop only does
      // 6 multiplies + 2 adds + a sin/cos per satellite per frame.
      mesh.userData = {
        transient: true, kind: 'satellite', id: sat.id, name: sat.name, raw: sat,
        orbit: {
          r, inc, raan, phase0, meanMotion,
          cosI: Math.cos(inc), sinI: Math.sin(inc),
          cosO: Math.cos(raan), sinO: Math.sin(raan),
        },
      };
      // Drop the satellite on its initial position so it's visible before
      // the first animation frame.
      updateSatellitePosition(mesh, 0);
      scene.add(mesh);
      sceneObjects.push(mesh);
    }

    function orbitPointAt(o, M) {
      const cosM = Math.cos(M), sinM = Math.sin(M);
      const xop = o.r * cosM;
      const yop = o.r * sinM;
      const xOI = xop;
      const yOI = yop * o.cosI;
      const zOI = yop * o.sinI;
      return [
        xOI * o.cosO + zOI * o.sinO,
        yOI,
        -xOI * o.sinO + zOI * o.cosO,
      ];
    }

    function updateSatellitePosition(mesh, simSecNow) {
      const o = mesh.userData.orbit;
      const M = o.phase0 + simSecNow * o.meanMotion;
      const [x, y, z] = orbitPointAt(o, M);
      if (isFinite(x) && isFinite(y) && isFinite(z)) mesh.position.set(x, y, z);
    }

    /**
     * Build ONE LineSegments mesh containing every satellite's orbit. Drawing
     * 500 individual Line objects would cost 500 draw calls — this version is
     * a single call into a packed buffer.
     */
    function rebuildOrbitLines() {
      if (orbitLinesObj) { scene.remove(orbitLinesObj); orbitLinesObj.geometry.dispose(); orbitLinesObj = null; }
      const satellites = sceneObjects.filter(o => o.userData.kind === 'satellite');
      if (!satellites.length || !showOrbits) return;
      const SEG = 64;
      const positions = new Float32Array(satellites.length * SEG * 2 * 3);
      const colors    = new Float32Array(satellites.length * SEG * 2 * 3);
      const c = new THREE.Color();
      let p = 0;
      for (const s of satellites) {
        const o = s.userData.orbit;
        const kind = s.userData.raw?.type;
        const hex = kind === 'GEO' ? 0xff7755 : kind === 'MEO' ? 0xffd24e : 0x4ec3ff;
        c.setHex(hex);
        for (let i = 0; i < SEG; i++) {
          const M1 = (i / SEG) * 2 * Math.PI;
          const M2 = ((i + 1) / SEG) * 2 * Math.PI;
          const [x1, y1, z1] = orbitPointAt(o, M1);
          const [x2, y2, z2] = orbitPointAt(o, M2);
          positions[p]   = x1; positions[p+1] = y1; positions[p+2] = z1;
          positions[p+3] = x2; positions[p+4] = y2; positions[p+5] = z2;
          // Same color for both vertices of the segment.
          colors[p]   = c.r; colors[p+1] = c.g; colors[p+2] = c.b;
          colors[p+3] = c.r; colors[p+4] = c.g; colors[p+5] = c.b;
          p += 6;
        }
      }
      const geom = new THREE.BufferGeometry();
      geom.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      geom.setAttribute('color',    new THREE.BufferAttribute(colors,    3));
      const mat = new THREE.LineBasicMaterial({ vertexColors: true, transparent: true, opacity: 0.22 });
      orbitLinesObj = new THREE.LineSegments(geom, mat);
      orbitLinesObj.userData = { transient: true };
      scene.add(orbitLinesObj);
    }

    async function buildPlanetScene(planet) {
      currentSceneKey = `planet:${planet.id}`;
      $('scene-name').textContent = ' ' + planet.name;
      clearScene();
      const color = parseInt((planet.color || '#888888').slice(1), 16);
      const body = new THREE.Mesh(
        new THREE.SphereGeometry(PLANET_R, 64, 64),
        new THREE.MeshStandardMaterial({ color, emissive: color, emissiveIntensity: 0.06, roughness: 0.7 })
      );
      body.userData = { transient: true, kind: 'planet', id: planet.id, name: planet.name, raw: planet };
      scene.add(body); sceneObjects.push(body);
      let moons = planet.moons;
      if (!Array.isArray(moons) || moons.length === 0) {
        try { moons = arr(await api(`/planets/${planet.id}/moons`), 'moons'); } catch { moons = []; }
      }
      if (moons.length) {
        const radii = moons.map(m => m.orbital_radius_km || 1);
        const rMin = Math.min(...radii), rMax = Math.max(...radii);
        moons.forEach((m, i) => {
          const norm = radii.length > 1 ? (radii[i] - rMin) / Math.max(1e-9, rMax - rMin) : 0.5;
          const orbitR = PLANET_R + 20 + norm * 180;
          const theta = (m.id * 0.9) % (2 * Math.PI);
          const orbit = new THREE.RingGeometry(orbitR - 0.3, orbitR + 0.3, 96);
          const oMesh = new THREE.Mesh(orbit, new THREE.MeshBasicMaterial({ color: 0x335577, side: THREE.DoubleSide, transparent: true, opacity: 0.45 }));
          oMesh.rotation.x = Math.PI / 2 + ((m.id * 0.1) % 0.6 - 0.3);
          oMesh.userData = { transient: true };
          scene.add(oMesh);
          const moonMesh = new THREE.Mesh(
            new THREE.SphereGeometry(Math.max(2.5, Math.min(8, Math.log10((m.radius_km || 10) + 1) * 2)), 16, 16),
            new THREE.MeshStandardMaterial({ color: 0xcfd6e0, roughness: 0.9 })
          );
          moonMesh.position.set(orbitR * Math.cos(theta), Math.sin(theta * 1.3) * 8, orbitR * Math.sin(theta));
          moonMesh.userData = { transient: true, kind: 'moon', id: m.id, name: m.name, raw: m, planet_id: planet.id };
          scene.add(moonMesh); sceneObjects.push(moonMesh);
        });
      }
      camera.position.set(0, 120, 320);
      controls.target.set(0,0,0); controls.update();
      updateCounter();
    }

    function filterSats(list) {
      return list.filter(s => {
        if (activeFilter !== 'ALL' && s.type !== activeFilter) return false;
        if (searchQuery && !s.name.toLowerCase().includes(searchQuery)) return false;
        return true;
      });
    }
    function updateCounter() {
      if (currentSceneKey === 'earth') {
        $('counter').textContent = `${filterSats(satellites).length} / ${satellites.length} satellites`;
      } else {
        const moonCount = sceneObjects.filter(o => o.userData.kind === 'moon').length;
        const planet = planets.find(p => `planet:${p.id}` === currentSceneKey);
        $('counter').textContent = planet ? `${moonCount} moons orbiting ${planet.name}` : '';
      }
    }

    async function openDetail(obj) {
      const { kind, id, raw } = obj.userData;
      const panel = $('detail-body');
      panel.innerHTML = '<div class="subtitle">Loading…</div>';
      $('detail').classList.add('open');
      let data = raw, extra = {};
      try {
        if (kind === 'satellite') {
          data = await api(`/satellites/${id}`);
          try { extra = await api(`/bodies/satellite/${id}`); } catch {}
        } else if (kind === 'planet') {
          data = await api(`/planets/${id}`);
          try { extra = await api(`/bodies/planet/${id}`); } catch {}
        } else if (kind === 'moon') {
          try { extra = await api(`/bodies/moon/${id}`); } catch {}
        }
      } catch {}
      panel.innerHTML = renderDetail(kind, data, extra);
      panel.querySelectorAll('[data-jump]').forEach(el => {
        el.addEventListener('click', () => {
          const [k, i] = el.dataset.jump.split(':');
          jumpTo(k, parseInt(i, 10));
        });
      });
    }
    function renderDetail(kind, d, extra) {
      const row = (k, v) => v != null && v !== '' ? `<div class="row"><span class="k">${k}</span><span class="v">${v}</span></div>` : '';
      const title = d?.name ?? '(unknown)';
      const subtitle = kind.toUpperCase();
      const rows = [];
      if (kind === 'satellite') {
        rows.push(row('NORAD ID', d.norad_id));
        rows.push(row('Type', `<span style="color:${d.type==='GEO'?'#ff7755':d.type==='MEO'?'#ffd24e':'#4ec3ff'}">${d.type}</span>`));
        rows.push(row('Altitude', `${(d.altitude_km||0).toLocaleString()} km`));
        rows.push(row('Inclination', `${d.inclination_deg?.toFixed?.(1) ?? '–'}°`));
        rows.push(row('Period', `${d.period_min?.toFixed?.(1) ?? '–'} min`));
        rows.push(row('Country', d.country));
        rows.push(row('Launched', d.launch_year));
      } else if (kind === 'planet') {
        rows.push(row('Distance', `${d.distance_au?.toFixed?.(2) ?? '–'} AU`));
        rows.push(row('Radius', `${(d.radius_km||0).toLocaleString()} km`));
        rows.push(row('Rotation', `${d.rotation_period_hours?.toFixed?.(1) ?? '–'} h`));
        rows.push(row('Colour', `<span style="color:${d.color}">${d.color}</span>`));
        rows.push(row('Moons', d.moons?.length ?? 0));
      } else if (kind === 'moon') {
        rows.push(row('Orbital radius', `${(d.orbital_radius_km||0).toLocaleString()} km`));
        rows.push(row('Radius', `${(d.radius_km||0).toLocaleString()} km`));
      }
      let parentChip = '';
      if (extra?.parent) {
        parentChip = `<div class="section">Parent</div><div class="chip-row"><span class="chip" data-jump="${extra.parent.type}:${extra.parent.id}">${extra.parent.name}</span></div>`;
      }
      let moonChips = '';
      if (kind === 'planet' && d?.moons?.length) {
        moonChips = `<div class="section">Moons (${d.moons.length})</div><div class="chip-row">` +
                    d.moons.slice(0, 12).map(m => `<span class="chip" data-jump="moon:${m.id}">${m.name}</span>`).join('') + `</div>`;
      }
      let sibChips = '';
      if (extra?.siblings?.length) {
        sibChips = `<div class="section">Siblings</div><div class="chip-row">` +
                   extra.siblings.slice(0, 8).map(s => `<span class="chip" data-jump="${s.type}:${s.id}">${s.name}</span>`).join('') + `</div>`;
      }
      return `
        <h2>${title}</h2>
        <div class="subtitle">${subtitle}${kind==='planet' ? ' · planet body' : ''}</div>
        ${rows.join('')}
        ${d?.description ? `<div class="desc">${d.description}</div>` : ''}
        ${parentChip}
        ${moonChips}
        ${sibChips}
      `;
    }
    $('detail-close').addEventListener('click', () => $('detail').classList.remove('open'));

    // Raycaster: hover tooltip + click focus
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    const tooltip = $('tooltip');
    addEventListener('mousemove', (e) => {
      mouse.x = (e.clientX / innerWidth) * 2 - 1;
      mouse.y = -(e.clientY / innerHeight) * 2 + 1;
      raycaster.setFromCamera(mouse, camera);
      const hits = raycaster.intersectObjects(sceneObjects, false);
      if (hits.length) {
        const u = hits[0].object.userData;
        const meta = u.kind === 'satellite' ? `${u.raw.type} · ${u.raw.altitude_km} km · ${u.raw.country ?? ''}` :
                     u.kind === 'moon' ? `moon` :
                     u.kind === 'planet' ? `planet` : '';
        tooltip.innerHTML = `<div class="name">${u.name}</div><div class="meta">${meta}</div>`;
        tooltip.style.left = (e.clientX + 12) + 'px';
        tooltip.style.top = (e.clientY + 12) + 'px';
        tooltip.classList.add('show');
        document.body.style.cursor = 'pointer';
      } else {
        tooltip.classList.remove('show');
        document.body.style.cursor = '';
      }
    });
    renderer.domElement.addEventListener('click', () => {
      raycaster.setFromCamera(mouse, camera);
      const hits = raycaster.intersectObjects(sceneObjects, false);
      if (!hits.length) return;
      const obj = hits[0].object;
      animateCameraTo(obj.position.clone(), () => openDetail(obj));
    });

    function animateCameraTo(target, after) {
      const start = camera.position.clone();
      const dir = target.clone().sub(controls.target);
      const dist = Math.max(80, target.length() * 2.2);
      const targetCam = target.clone().add(new THREE.Vector3(0, 30, 0));
      if (target.length() < 5) {
        targetCam.set(0, 80, 220);
      } else {
        targetCam.copy(target).normalize().multiplyScalar(dist).add(new THREE.Vector3(0, 30, 0));
      }
      const startTarget = controls.target.clone();
      const t0 = performance.now();
      const dur = 700;
      function step() {
        const t = Math.min(1, (performance.now() - t0) / dur);
        const e = 1 - Math.pow(1 - t, 3);
        camera.position.lerpVectors(start, targetCam, e);
        controls.target.lerpVectors(startTarget, target, e);
        controls.update();
        if (t < 1) requestAnimationFrame(step);
        else if (after) after();
      }
      step();
    }

    function renderPlanetBar() {
      const bar = $('planet-bar');
      bar.innerHTML = '';
      const earthPill = document.createElement('button');
      earthPill.className = 'planet-pill' + (currentSceneKey === 'earth' ? ' active' : '');
      earthPill.innerHTML = '<span class="swatch" style="background:#2266aa"></span> Earth orbits';
      earthPill.onclick = () => { buildEarthScene(); renderPlanetBar(); };
      bar.appendChild(earthPill);
      for (const p of planets) {
        const pill = document.createElement('button');
        pill.className = 'planet-pill' + (currentSceneKey === `planet:${p.id}` ? ' active' : '');
        pill.innerHTML = `<span class="swatch" style="background:${p.color || '#888'}"></span> ${p.name}`;
        pill.onclick = async () => { await buildPlanetScene(p); renderPlanetBar(); };
        bar.appendChild(pill);
      }
    }

    async function jumpTo(kind, id) {
      if (kind === 'planet') {
        let p = planets.find(x => x.id === id);
        if (!p) { try { p = await api(`/planets/${id}`); } catch {} }
        if (p) { await buildPlanetScene(p); renderPlanetBar(); }
      } else if (kind === 'satellite') {
        if (currentSceneKey !== 'earth') buildEarthScene();
        renderPlanetBar();
        const obj = sceneObjects.find(o => o.userData.kind === 'satellite' && o.userData.id === id);
        if (obj) animateCameraTo(obj.position.clone(), () => openDetail(obj));
      } else if (kind === 'moon') {
        const obj = sceneObjects.find(o => o.userData.kind === 'moon' && o.userData.id === id);
        if (obj) animateCameraTo(obj.position.clone(), () => openDetail(obj));
      }
    }

    $('search').addEventListener('input', (e) => {
      searchQuery = e.target.value.toLowerCase().trim();
      if (currentSceneKey === 'earth') buildEarthScene();
    });
    document.querySelectorAll('#filters .filter-btn').forEach(b => {
      b.addEventListener('click', () => {
        document.querySelectorAll('#filters .filter-btn').forEach(x => x.classList.remove('active'));
        b.classList.add('active');
        activeFilter = b.dataset.filter;
        if (currentSceneKey === 'earth') buildEarthScene();
      });
    });
    $('recenter').addEventListener('click', () => {
      animateCameraTo(new THREE.Vector3(0, 0, 0));
      $('detail').classList.remove('open');
    });

    // --------- Playback controls ---------
    // Slider value 0..100 maps logarithmically to speeds 1× .. 2000×.
    // Default slider = 60 → 600× (matches the previous fixed scale).
    function sliderToSpeed(v) {
      const t = v / 100;                 // 0..1
      return Math.round(Math.pow(10, t * Math.log10(2000)));  // 1 .. 2000
    }
    function speedToSlider(s) {
      return Math.round((Math.log10(s) / Math.log10(2000)) * 100);
    }
    const speedInput = $('speed');
    const speedVal = $('speed-val');
    function applySpeed(s) {
      satTimeScale = s;
      if (!paused) lastResumeScale = s;
      speedVal.textContent = s + '×';
    }
    speedInput.value = speedToSlider(SAT_TIME_SCALE_DEFAULT);
    applySpeed(SAT_TIME_SCALE_DEFAULT);
    speedInput.addEventListener('input', (e) => {
      const s = sliderToSpeed(parseInt(e.target.value, 10));
      if (paused) {
        // Changing speed while paused just updates the "resume to" value.
        lastResumeScale = s;
        speedVal.textContent = s + '× (paused)';
      } else {
        applySpeed(s);
      }
    });

    const playBtn = $('play-pause');
    function setPaused(yes) {
      paused = yes;
      if (yes) {
        playBtn.textContent = '▶ Play';
        playBtn.classList.add('active');
        speedVal.textContent = lastResumeScale + '× (paused)';
      } else {
        playBtn.textContent = '⏸ Pause';
        playBtn.classList.remove('active');
        applySpeed(lastResumeScale);
      }
    }
    playBtn.addEventListener('click', () => setPaused(!paused));
    addEventListener('keydown', (e) => {
      if (e.key === ' ' && e.target.tagName !== 'INPUT') { e.preventDefault(); setPaused(!paused); }
    });

    const orbitsToggle = $('show-orbits');
    orbitsToggle.addEventListener('change', () => {
      showOrbits = orbitsToggle.checked;
      if (currentSceneKey === 'earth') rebuildOrbitLines();
    });

    async function boot() {
      try {
        [satellites, planets] = await Promise.all([
          api('/satellites/?limit=500').then(d => arr(d, 'satellites')),
          api('/planets/').then(d => arr(d, 'planets')),
        ]);
      } catch (e) {
        $('loading').textContent = 'Error loading data: ' + e.message;
        return;
      }
      buildEarthScene();
      renderPlanetBar();
      $('loading').classList.add('hidden');
    }

    function loop() {
      requestAnimationFrame(loop);
      controls.update();
      const now = performance.now();
      const dtReal = (now - lastFrameReal) / 1000;
      lastFrameReal = now;
      if (!paused) simSec += dtReal * satTimeScale;
      for (const o of sceneObjects) {
        if (o.userData.kind === 'planet') { if (!paused) o.rotation.y += dtReal * 0.5 * (satTimeScale / SAT_TIME_SCALE_DEFAULT); continue; }
        if (o.userData.kind === 'satellite' && o.userData.orbit) {
          updateSatellitePosition(o, simSec);
        }
      }
      renderer.render(scene, camera);
    }
    loop();
    boot();
  </script>
</body>
</html>
