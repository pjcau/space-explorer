version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    # No host port — only the frontend nginx (below) is exposed publicly.
    expose:
      - "8000"
    environment:
      - DATABASE_URL=sqlite:////app/data/space_data.db
    volumes:
      - explorer_db:/app/data
    networks:
      - space-network

  frontend:
    image: nginx:alpine
    ports:
      - "5500:80"        # <-- the single port the user opens
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - space-network

volumes:
  explorer_db:

networks:
  space-network:
    driver: bridge
