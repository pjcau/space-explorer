server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://backend:8000/;
        # Use $http_host so the upstream sees the original "host:port" —
        # otherwise FastAPI builds redirect URLs without the port and the
        # browser/proxy ends up calling port 80.
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # FastAPI's trailing-slash 307 → rewrite the "/foo/" path to
        # "/api/foo/" so the prefix survives the round-trip.
        proxy_redirect ~^http://[^/]+/ /api/;
        absolute_redirect off;
    }
    location / {
        try_files $uri $uri/ /index.html;
    }
}
